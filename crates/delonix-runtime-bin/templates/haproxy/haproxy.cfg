global
    log stdout format raw local0 info
    maxconn 2048

defaults
    mode    http
    log     global
    option  httplog
    option  http-server-close
    timeout connect 5s
    timeout client  30s
    timeout server  30s

frontend http_in
    bind *:__PORT__
    # Health endpoint answered by the proxy itself (no backend needed).
    http-request return status 200 content-type "text/plain" string "ok\n" if { path /healthz }
    default_backend app

backend app
    balance roundrobin
    # Real deployment: point at your app servers and enable health checks:
    #   server app1 app:3000 check
    #   server app2 app2:3000 check
    # Standalone scaffold: the proxy answers directly so it runs out of the box.
    http-request return status 200 content-type "text/html" string "<h1>__NAME__ via HAProxy</h1>\n"
