# Secret — um saco de pares CHAVE=valor, cifrado em repouso (XChaCha20-Poly1305
# sob a chave-mestra do host). Consumido por `Container.secret` (env ou
# /run/secrets/<nome>) e por `Storage.passwordSecret` (lê a chave `password`).
#
# É a forma DECLARATIVA do `delonix secret create` — assim o ciclo fecha-se só
# em YAML, sem CLI. Apply:  delonix secret apply -f examples/secret.yaml
#   (ou, junto com o resto, `delonix stack apply` — os Secrets são aplicados
#    ANTES do Storage/Container que os referenciam.)

# ── Inline (stringData) — cómodo para dev, mas os VALORES ficam em CLARO no
#    ficheiro. NÃO commites um manifesto destes num repositório. ───────────────
apiVersion: delonix.io/v1
kind: Secret
metadata:
  name: nas-creds
spec:
  stringData:
    password: s3cr3t          # Storage.passwordSecret lê exactamente esta chave
---
# ── fromEnvFile — mantém os valores FORA do manifesto (carrega linhas
#    KEY=value de um ficheiro .env, tipicamente fora do controlo de versões). ──
apiVersion: delonix.io/v1
kind: Secret
metadata:
  name: app-env
spec:
  fromEnvFile: ./app.env      # ex.: DATABASE_URL=..., API_TOKEN=...
