# Cluster Kubernetes em **hosts remotos JÁ EXISTENTES** (bare-metal ou VMs de
# outrem), via SSH.
#
#   delonix cluster apply -f examples/cluster-ssh.yaml
#
# O delonix NÃO cria estas máquinas — elas já têm de estar vivas e alcançáveis,
# com o utilizador SSH a ter `sudo` NOPASSWD. É o modo para datacenter.
#
# **Idempotente sem ficheiro de estado** ("Terraform sem .tfstate"): cada passo
# tem um `check` (comando shell; êxito = já satisfeito) e um `apply`. Correr
# duas vezes não faz nada de novo — e nunca dessincroniza de um estado paralelo,
# porque não existe nenhum.
apiVersion: delonix.io/v1
kind: Cluster
metadata:
  name: prod
spec:
  mode: ssh

  # --- comum a todos os modos ---
  k8sVersion: "1.34"
  podSubnet: 10.244.0.0/16
  serviceSubnet: 10.96.0.0/12
  cni: none            # em produção, normalmente instalas a TUA CNI (Cilium, Calico…)

  # HA: com >1 control-plane, o `controlPlaneEndpoint` é OBRIGATÓRIO — o kubeadm
  # precisa de um endereço estável (LB/VIP) à frente deles. O delonix não
  # provisiona o LB; aponta para um que já tenhas.
  controlPlaneEndpoint: "k8s-api.exemplo.ao:6443"

  controlPlane:
    hosts:
      - address: 10.0.0.11
      - address: 10.0.0.12
      - address: 10.0.0.13
  workers:
    hosts:
      - address: 10.0.0.21
      - address: 10.0.0.22

  # --- específico do modo ssh ---
  ssh:
    user: delonix       # tem de ter sudo NOPASSWD nos hosts
    keyPath: ~/.ssh/id_ed25519
    port: 22

  # Só `stacked` (etcd nos control-planes, o default do kubeadm) está suportado.
  # `external` é reconhecido no schema mas recusado com erro claro — etcd externo
  # (TLS entre membros, discovery) é um subprojecto à parte.
  etcd:
    mode: stacked
