# kind: FirewallPolicy — firewall L4 declarativo por container (estilo k8s
# NetworkPolicy), com a direcção em `spec.direction`. Cada documento é o ESTADO
# DESEJADO de uma direcção do container-alvo: aplicar substitui as regras dessa
# direcção (allowlist + default-deny), deixando a outra intacta. Aplicado por
# `stack apply` DEPOIS dos containers existirem. Só actua em containers na SDN.
#
# NOTA: `kind: Ingress` já NÃO é firewall — passou a ser o Ingress L7/HTTP estilo
# k8s (host/path→backend, ver examples/ingress.yaml). Para o firewall inbound usa
# `kind: FirewallPolicy` com `direction: ingress` (como abaixo). `kind: Egress`
# (firewall outbound) continua a funcionar.
---
apiVersion: delonix.io/v1
kind: FirewallPolicy
metadata:
  name: db-inbound
spec:
  direction: ingress       # ingress (inbound) | egress (outbound)
  target: dbapp            # nome do container-alvo (deve existir, em rede custom)
  defaultPolicy: deny      # allow | deny (default: deny — só passa o que estiver listado)
  rules:
    - proto: tcp           # tcp | udp | any (default: any)
      port: "5432"         # número, intervalo "n-m", ou "*"
      from: 10.219.0.0/16  # CIDR de origem (default: qualquer)
      action: allow        # allow | deny (default: allow)
      note: postgres-from-sdn
---
apiVersion: delonix.io/v1
kind: Egress
metadata:
  name: db-outbound
spec:
  target: dbapp
  defaultPolicy: deny
  rules:
    - proto: udp
      port: "53"
      note: dns
    - proto: tcp
      port: "443"
      to: 0.0.0.0/0        # CIDR de destino (default: qualquer)
      note: https-egress
