# Cluster Kubernetes LOCAL, em containers — sem Docker e sem o binário `kind`.
#
#   delonix cluster apply -f examples/cluster-kind.yaml
#
# Equivale a `delonix cluster create --name lab` (que não precisa de manifesto
# nenhum). Usa-se o manifesto quando queres versionar a configuração no git ou
# afinar campos que as flags não expõem.
apiVersion: delonix.io/v1
kind: Cluster
metadata:
  name: lab
spec:
  # kind = nós em containers, nesta máquina (este ficheiro)
  # vm   = VMs a partir da imagem dourada       (ver cluster-vm.yaml)
  # ssh  = hosts remotos já existentes          (ver cluster-ssh.yaml)
  mode: kind

  # --- comum a todos os modos ---
  k8sVersion: "1.34"
  podSubnet: 10.244.0.0/16
  serviceSubnet: 10.96.0.0/12
  # default = a CNI que vem na imagem do nó (kindnet)
  # none    = não instalar nenhuma; o nó fica NotReady até aplicares a tua
  #           (é o comportamento do `kubeadm` puro — nada de magia escondida)
  cni: default

  controlPlane:
    replicas: 1        # >1 exige controlPlaneEndpoint (LB/VIP) — ver cluster-ssh.yaml
  workers:
    replicas: 0

  # --- específico do modo kind ---
  kind:
    # Fixada por digest de propósito: uma tag móvel tornaria o cluster
    # irreprodutível entre máquinas e no tempo.
    image: kindest/node:v1.34.0@sha256:7416a61b42b1662ca6ca89f02028ac133a309a2a30ba309614e8ec94d976dc5a
    # Porta do HOST para o apiserver (o kubeconfig gerado aponta para cá).
    apiServerPort: 6443
