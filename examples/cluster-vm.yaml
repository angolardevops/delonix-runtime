# Cluster Kubernetes em **microVMs** a partir da imagem dourada.
#
#   delonix image vm build -t k8s-golden --k8s-version 1.34   # uma vez
#   delonix network create lab-net
#   delonix cluster apply -f examples/cluster-vm.yaml
#
# Ao contrário do modo `kind` (containers nesta máquina), aqui cada nó é uma VM
# real com kernel próprio — isolamento de hipervisor. A imagem dourada já traz
# kubeadm/kubelet/kubectl e o `delonix-cri`: arrancar um nó NÃO instala nada,
# só corre `kubeadm init`/`join`.
apiVersion: delonix.io/v1
kind: Cluster
metadata:
  name: lab
spec:
  mode: vm

  # --- comum a todos os modos ---
  k8sVersion: "1.34"
  podSubnet: 10.244.0.0/16
  serviceSubnet: 10.96.0.0/12
  cni: default

  controlPlane:
    replicas: 1        # >1 exige controlPlaneEndpoint (LB/VIP) — limitação conhecida
  workers:
    replicas: 2

  # --- específico do modo vm ---
  vm:
    # Tag em `delonix image vm ls`. Omitir = usa a única imagem local, se houver
    # exactamente uma (com 0 ou várias, erro claro — nunca escolhe às cegas).
    image: k8s-golden
    network: lab-net   # criada antes com `delonix network create`
    vcpus: 2
    memory: 2G
    # Chave SSH privada para falar com as VMs. Omitir = gera um par ed25519 em
    # <root>/clusters/<name>/id_ed25519. O utilizador é sempre `delonix` (a
    # conta que a imagem dourada cria).
    # sshKey: ~/.ssh/id_ed25519
    bootTimeout: 300s  # espera por SSH depois do arranque da VM
