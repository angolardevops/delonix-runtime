# Release — compila e publica os binários quando uma tag `v*` é feita push.
#
# Porquê em CI e não na máquina de quem faz a release: o build precisa de
# `protoc` (delonix-cri) e o artefacto deve sair de um ambiente reprodutível.
# Runner ubuntu-22.04 DE PROPÓSITO: glibc 2.35 — o binário corre em qualquer
# distro igual ou mais recente (RHEL 9, Debian 12, Ubuntu 22.04+); um runner
# `latest` (24.04, glibc 2.39) excluiria as enterprise ainda em uso.
#
# Assets publicados (nomes estáveis — o scripts/install.sh depende deles):
#   delonix-x86_64-linux, delonix-cri-x86_64-linux, SHA256SUMS, install.sh
#
# Notas da release: docs/releases/<tag>.md se existir; senão, autogeradas.
name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    name: build & publish
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Instala protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - name: Instala toolchain fixada
        run: rustup show
      - uses: Swatinem/rust-cache@v2
      - name: Compila (release, x86-64 genérico)
        run: cargo build --release --locked -p delonix-runtime-bin -p delonix-cri
      - name: Guarda binários genéricos
        run: |
          mkdir -p dist-release
          cp target/release/delonix     dist-release/delonix-x86_64-linux
          cp target/release/delonix-cri dist-release/delonix-cri-x86_64-linux
      # Variante x86-64-v3 (AVX2/BMI2/FMA — Zen 2+/Haswell+): o instalador
      # escolhe-a automaticamente quando o CPU a suporta; o genérico continua
      # a ser o fallback universal. target-cpu diferente ⇒ rebuild completo.
      - name: Compila (release, x86-64-v3)
        env:
          RUSTFLAGS: "-C target-cpu=x86-64-v3"
        run: cargo build --release --locked -p delonix-runtime-bin -p delonix-cri
      - name: Prepara assets
        run: |
          cp target/release/delonix     dist-release/delonix-x86_64-v3-linux
          cp target/release/delonix-cri dist-release/delonix-cri-x86_64-v3-linux
          strip dist-release/delonix-*-linux
          cp scripts/install.sh dist-release/install.sh
          cd dist-release && sha256sum delonix-x86_64-linux delonix-x86_64-v3-linux delonix-cri-x86_64-linux delonix-cri-x86_64-v3-linux install.sh > SHA256SUMS
      - name: Sanidade — o binário arranca e reporta a versão da tag
        run: |
          V=$(dist-release/delonix-x86_64-linux --version)
          echo "$V"
          echo "$V" | grep -q "${GITHUB_REF_NAME#v}" || { echo "::error::versão do binário ($V) != tag ($GITHUB_REF_NAME) — esqueceu-se o bump no Cargo.toml?"; exit 1; }
      - name: Publica a release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          NOTES="docs/releases/${GITHUB_REF_NAME}.md"
          if [ -f "$NOTES" ]; then
            # Título = primeira linha (heading) das notas — convenção das releases anteriores.
            TITLE=$(head -1 "$NOTES" | sed 's/^#* *//')
            gh release create "$GITHUB_REF_NAME" dist-release/* --title "$TITLE" --notes-file "$NOTES"
          else
            gh release create "$GITHUB_REF_NAME" dist-release/* --title "$GITHUB_REF_NAME" --generate-notes
          fi
